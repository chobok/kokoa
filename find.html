<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find - KakaoTalk</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/5e30b89af1.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="status-bar">
        <div class="status-bar__left">
            <span>No Service</span>
            <i class="fa-solid fa-wifi"></i>
        </div>
        <div class="status-bar__center">
            <span>21:23</span>
        </div>
        <div class="status-bar__right">
            <i class="fa-solid fa-camera-rotate"></i>
            <span>100%</span>
            <i class="fa-solid fa-battery-full"></i>
        </div>
    </div>

    <header class="screen-header">
        <h1 class="screen-header__title">Find</h1>
        <div class="screen-header__icons">
            <span><i class="fa-solid fa-magnifying-glass"></i></span>
            <span class="screen-header__gear">
                <a href="settings.html" style="color: inherit;">
                    <span class="nav__notification dot"></span>
                    <i class="fa-solid fa-gear"></i>
                </a>
            </span>
        </div>
    </header>

    <main class="main-screen find-screen">
        <div class="icon-row">
            <div class="icon-row__icon">
                <i class="fa-solid fa-qrcode"></i>
                <span>QR Code</span>
            </div>
            <div class="icon-row__icon">
                <i class="fa-regular fa-address-book"></i>
                <span>Add by Contacts</span>
            </div>
            <div class="icon-row__icon">
                <i class="fa-solid fa-id-badge"></i>
                <span>Add by ID</span>
            </div>
            <div class="icon-row__icon">
                <i class="fa-regular fa-envelope"></i>
                <span>Invite</span>
            </div>
        </div>

        <div class="recommended-friends">
            <h6 class="recommended-friends__title">Recommended Friends</h6>
            <span class="recommended-friends__text">You have no recommended friends.</span>
        </div>

        <div class="open-chat">
            <div class="open-chat__header">
                <h4>Open Chat</h4>
                <span>Go to Openchat Home <i class="fa-solid fa-chevron-right"></i></span>
            </div>

            <div class="open-post">
                <div class="open-post__column">
                    <h5 class="open-post__title">#BTS</h5>
                    <h6 class="open-post__hashtags">#BTS#ARMY#FRIENDS</h6>
                    <div class="open-post__members">
                        <img src="https://i.namu.wiki/i/LLMLraamCfYzwu_aeVSLe5Qjjv-Cs9sML27zdScGMd81oXWgnaU4i_E8jjib-wjwm40fUZ7V5K8Uti2dLkxi7g.webp"
                            alt="" class="open-post__member-avatar">
                        <span class="open-post__member-count">802 members</span>
                        <div class="open-post__divider"></div>
                        <span class="open-post__member-status">Active</span>
                    </div>
                </div>
                <div class="open-post__column">
                    <div class="open-post__photo">
                        <img src="https://kr.ktown4u.com/goods_files/SH0164/goods_images/000054/GD00053992.default.1.png"
                            alt="bts">
                        <div class="open-post__heart-count">
                            <i class="fa-solid fa-heart"></i> <span>326</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="open-post">
                <div class="open-post__column">
                    <h5 class="open-post__title">Bts Gang~</h5>
                    <h6 class="open-post__hashtags">#englishonly #ipurpleyou #jimin #taeta...</h6>
                    <div class="open-post__members">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Jung_Kook_of_BTS%2C_February_12%2C_2026_%281%29.png"
                            alt="" class="open-post__member-avatar">
                        <span class="open-post__member-count">299 members</span>
                        <div class="open-post__divider"></div>
                        <span class="open-post__member-status">Active</span>
                    </div>
                </div>
                <div class="open-post__column">
                    <div class="open-post__photo">
                        <img src="https://i.namu.wiki/i/iTMpWEN0mgkB3xrOVIg7yNWJojkN-E7jyYZ-SVAG4iyf8bG9hKbbXRZx2ue8ejIxkpAY_EybS4Can1UyFibGsA.webp"
                            alt="bts gang">
                        <div class="open-post__heart-count">
                            <i class="fa-solid fa-heart"></i> <span>215</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="fa-regular fa-user"></i></a></li>
            <li class="nav__btn">
                <a class="nav__link" href="chats.html">
                    <span class="nav__notification badge">1</span>
                    <i class="fa-regular fa-comment"></i>
                </a>
            </li>
            <li class="nav__btn">
                <a class="nav__link" href="find.html">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </a>
            </li>
            <li class="nav__btn">
                <a class="nav__link" href="more.html">
                    <span class="nav__notification dot"></span>
                    <i class="fa-solid fa-ellipsis"></i>
                </a>
            </li>
        </ul>
    </nav>
</body>

</html>
