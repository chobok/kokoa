<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kokoa Talk</title>
    <script src="https://kit.fontawesome.com/5e30b89af1.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="status-bar">
        <div class="status-bar__left">
            <span>No Service</span>
            <i class="fa-solid fa-wifi"></i>
        </div>
        <div class="status-bar__center">
            <span>18:43</span>
        </div>
        <div class="status-bar__right">
            <i class="fa-solid fa-camera-rotate"></i>
            <span>11%</span>
            <i class="fa-solid fa-battery-quarter"></i>
            <i class="fa-solid fa-bolt"></i>
        </div>
    </div>

    <header class="welcome-header">
        <h1 class="welcome-header__title">Welcome to KakaoTalk</h1>
        <p class="welcome-header__text">
            If you have a Kakao Account,<br>
            log in with your email or phone number.
        </p>
    </header>

    <form action="#" id="login-form">
        <input type="text" placeholder="Email or phone number" required />
        <input type="password" placeholder="Password" required />
        <input type="submit" value="Log In" />
        <input type="button" value="Sign Up" />
    </form>

    <a id="find-account" href="#">Find Kakao Account or Password</a>



</body>

</html>
